spring:
  main:
    # 允许我们手写的 Bean 覆盖系统默认的，解决刚才的启动报错
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 50MB       # 修复 413 Payload Too Large
      max-request-size: 50MB
  data:
    redis:
      # 本地默认 localhost，服务器通过环境变量覆盖
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
      password: "${REDIS_PASSWORD:}"
      database: "${REDIS_DATABASE:0}"
      timeout: 5000ms
      ssl:
        enabled: "${REDIS_SSL:false}"
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  ai:
    # 1. 大模型配置 —— DeepSeek（速度快、成本低）
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat

    # 2. Qdrant 向量数据库配置
    vectorstore:
      qdrant:
        # 从环境变量读取（本地配置见 ai/.env）
        host: "${QDRANT_HOST}"
        port: "${QDRANT_PORT:6334}"
        api-key: "${QDRANT_API_KEY:}"
        # Qdrant Cloud 强制走 TLS
        use-tls: true
        # 向量表的名字
        collection-name: scenic_guide
        # 核心参数：必须与阿里 text-embedding-v2 的维度一致
        embedding-dimension: 1536
        # 启动时自动创建集合（距离默认 COSINE）
        initialize-schema: true

alibabacloud:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY}
  bailian:
    api-key: ${BAILIAN_API_KEY}
    rerank-url: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank