spring:
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
      password: "${REDIS_PASSWORD:}"
      database: "${REDIS_DATABASE:0}"
      timeout: 5000ms
      ssl:
        enabled: "${REDIS_SSL:false}"
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  ai:
    openai:
      api-key: "${DEEPSEEK_API_KEY:}"
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          max-tokens: 2000
          temperature: 0.3
alibabacloud:
  dashscope:
    api-key: "${DASHSCOPE_API_KEY:}"
bailian:
  rerank-url: "${BAILIAN_RERANK_URL:https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank}"
qdrant:
  host: "${QDRANT_HOST:localhost}"
  port: "${QDRANT_PORT:6334}"
  api-key: "${QDRANT_API_KEY:}"
baidu:
  api-key: "${BAIDU_API_KEY:}"
  secret-key: "${BAIDU_SECRET_KEY:}"
jwt:
  secret: "${JWT_SECRET:scenic-guide-secret-key-change-me}"
  expires-days: 7
context:
  keep-recent: 12